<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Throttle of Three</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- Title -->
  <section id="screen-title" class="overlay">
    <div class="panel">
      <h1>Throttle of Three</h1>
      <p class="tagline">Three drivers. One circuit. One winner.</p>

      <div class="card">
        <label for="name">Driver name</label>
        <input id="name" maxlength="18" placeholder="Driver" />
      </div>

      <div class="card">
        <label>Choose your car color</label>
        <div class="color-pick" id="color-pick"></div>
      </div>

      <div class="row">
        <button id="to-solo">Solo race</button>
        <button id="to-host" class="ghost">Host co-op</button>
      </div>

      <div class="or-divider">— or —</div>

      <div class="row">
        <input id="room-code-input" maxlength="6" placeholder="ROOM CODE" style="text-transform:uppercase;letter-spacing:0.3em;text-align:center;" />
        <button id="to-join" class="ghost">Join</button>
      </div>

      <div class="hint">
        <strong>WASD</strong> drive &nbsp;·&nbsp; <strong>Shift</strong> drift &nbsp;·&nbsp; <strong>Space</strong> boost &nbsp;·&nbsp;
        <strong>R</strong> respawn &nbsp;·&nbsp; <strong>C</strong> camera
      </div>
    </div>
  </section>

  <!-- Track select -->
  <section id="screen-track" class="overlay hidden">
    <div class="panel">
      <h2 id="track-pick-title">Pick a track</h2>
      <div class="track-pick" id="track-pick"></div>
      <div class="row">
        <button id="track-back" class="ghost">Back</button>
        <button id="track-confirm">Confirm</button>
      </div>
    </div>
  </section>

  <!-- Lobby (multiplayer) -->
  <section id="screen-lobby" class="overlay hidden">
    <div class="panel">
      <h2>Pre-race lobby</h2>
      <div class="card">
        <label>Track</label>
        <div id="lobby-track" class="lobby-track">—</div>
      </div>
      <div class="card">
        <label>Room code</label>
        <div class="room-code" id="room-code-display">—</div>
      </div>
      <div class="card">
        <div id="lobby-drivers" class="lobby-list"></div>
      </div>
      <button id="start-race-btn">Start race</button>
      <p class="muted-small hidden" id="lobby-wait">Waiting for the host to start…</p>
    </div>
  </section>

  <!-- Race HUD -->
  <div id="hud" class="hidden">
    <div id="speedo">
      <div class="speed-num" id="speed-num">0</div>
      <div class="speed-unit">km/h</div>
      <div class="boost-bar"><div id="boost-fill"></div></div>
      <div class="boost-label">BOOST</div>
    </div>

    <div id="race-info">
      <div class="line"><span class="hint-label">LAP</span> <span id="lap-num">1/3</span></div>
      <div class="line"><span class="hint-label">POS</span> <span id="pos-num">1/1</span></div>
      <div class="line"><span class="hint-label">TIME</span> <span id="race-time">0:00.00</span></div>
      <div class="line dim"><span class="hint-label">BEST</span> <span id="best-lap">—</span></div>
    </div>

    <div id="standings"></div>

    <div id="minimap">
      <canvas id="minimap-canvas" width="180" height="180"></canvas>
    </div>

    <div id="centermsg" class="hidden"></div>
  </div>

  <!-- Finish screen -->
  <section id="screen-finish" class="overlay hidden">
    <div class="panel">
      <h2 id="finish-title">Race complete</h2>
      <div id="finish-results" class="end-stats"></div>
      <div class="row">
        <button id="finish-again">Race again</button>
        <button id="finish-home" class="ghost">Title</button>
      </div>
    </div>
  </section>

  <div id="banner" class="hidden"></div>

  <script type="module" src="game.js"></script>
</body>
</html>
