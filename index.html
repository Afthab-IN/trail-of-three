<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lantern Path</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Three.js renders into this -->
  <canvas id="scene"></canvas>

  <!-- Title / start screen -->
  <section id="screen-start" class="overlay centered">
    <div class="title-block">
      <h1>The Lantern Path</h1>
      <p class="tagline">A story takes you through the wood. You decide who walks out.</p>
      <button id="begin-btn">Begin</button>
      <div class="hint">
        <strong>WASD</strong> walk &nbsp;·&nbsp; <strong>Mouse</strong> look &nbsp;·&nbsp; <strong>E</strong> interact &nbsp;·&nbsp; <strong>ESC</strong> release mouse
      </div>
    </div>
  </section>

  <!-- HUD shown while walking -->
  <div id="hud">
    <div id="interact-prompt" class="hidden">
      <kbd>E</kbd> <span>Speak</span>
    </div>
    <div id="lantern-icon">✦</div>
  </div>

  <!-- Dialogue overlay -->
  <section id="dialogue" class="hidden">
    <div class="dialogue-box">
      <div class="speaker" id="dialogue-speaker"></div>
      <div class="text" id="dialogue-text"></div>
      <div class="choices" id="dialogue-choices"></div>
      <div class="footer">
        <button id="continue-btn" class="ghost hidden">Continue ↵</button>
        <span class="muted-small" id="dialogue-hint">Click to skip</span>
      </div>
    </div>
  </section>

  <!-- Ending screen -->
  <section id="screen-ending" class="overlay centered hidden">
    <div class="title-block ending">
      <h2 id="ending-title"></h2>
      <div id="ending-text" class="ending-text"></div>
      <button id="restart-btn">Walk it again</button>
    </div>
  </section>

  <script type="module" src="game.js"></script>
</body>
</html>
